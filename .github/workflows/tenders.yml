name: Build and Deploy

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2t64 libnss3 libnspr4 libdrm2 libatspi2.0-0t64
      - run: pip install requests beautifulsoup4 lxml pandas openpyxl python-dateutil playwright
      - run: python -m playwright install chromium
      - run: python parser.py
      - uses: actions/upload-artifact@v4
        with:
          name: tenders-output
          path: out/
          retention-days: 30

  deploy:
    needs: parse
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out/
      - id: deployment
        uses: actions/deploy-pages@v4
